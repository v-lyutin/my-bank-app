spring:
  application:
    name: front-controller
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
        registration:
          keycloak:
            client-id: front-ui
            authorization-grant-type: authorization_code
            scope: openid,profile,email
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    enabled: true
    sampling:
      probability: ${TRACE_PROBABILITY}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT}
  metrics:
    distribution:
      percentiles-precision:
        http.server.requests: 2
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
mybank:
  clients:
    accounts-service:
      base-url: ${API_GATEWAY_URL}
    transfer-service:
      base-url: ${API_GATEWAY_URL}
    wallet-service:
      base-url: ${API_GATEWAY_URL}