apiVersion: v2
name: bank
description: Umbrella chart for my-bank-app
type: application
version: 0.1.0

dependencies:
  - name: accounts-db
    version: 0.1.0
    repository: "file://../accounts-db"

  - name: cash-db
    version: 0.1.0
    repository: "file://../cash-db"

  - name: transfer-db
    version: 0.1.0
    repository: "file://../transfer-db"

  - name: kafka
    version: 18.0.1
    repository: "https://helm-charts.itboon.top/kafka"

  - name: zipkin
    version: 0.1.0
    repository: "file://../zipkin"

  - name: prometheus
    version: 0.1.0
    repository: "file://../prometheus"
    condition: prometheus.enabled

  - name: grafana
    version: 1.0.0
    repository: "file://../grafana"

  - name: elasticsearch
    version: 0.1.0
    repository: "file://../elasticsearch"

  - name: logstash
    version: 0.1.0
    repository: "file://../logstash"

  - name: kibana
    version: 0.1.0
    repository: "file://../kibana"

  - name: api-gateway
    version: 0.1.0
    repository: "file://../api-gateway"

  - name: accounts-service
    version: 0.1.0
    repository: "file://../accounts-service"

  - name: cash-service
    version: 0.1.0
    repository: "file://../cash-service"

  - name: transfer-service
    version: 0.1.0
    repository: "file://../transfer-service"

  - name: notifications-service
    version: 0.1.0
    repository: "file://../notifications-service"

  - name: front-controller
    version: 0.1.0
    repository: "file://../front-controller"

