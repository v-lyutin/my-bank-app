apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kibana.fullname" . }}
  labels:
    app: {{ include "kibana.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "kibana.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "kibana.fullname" . }}
    spec:
      containers:
        - name: kibana
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: ELASTICSEARCH_HOSTS
              value: {{ .Values.elasticsearch.hosts | default (printf "http://%s-elasticsearch:9200" .Release.Name) | quote }}
            - name: TELEMETRY_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 5601
          resources:
            {{- toYaml .Values.resources | nindent 12 }}