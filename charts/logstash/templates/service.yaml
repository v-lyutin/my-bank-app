apiVersion: v1
kind: Service
metadata:
  name: {{ include "logstash.fullname" . }}
  labels:
    app: {{ include "logstash.fullname" . }}
spec:
  type: ClusterIP
  ports:
    - port: 5044
      targetPort: 5044
      protocol: TCP
      name: log-input
  selector:
    app: {{ include "logstash.fullname" . }}